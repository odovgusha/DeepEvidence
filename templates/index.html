<!DOCTYPE html>
<html>
<body>

<h1>📄 Upload PDF</h1>

<form action="/upload" method="post" enctype="multipart/form-data">
    <input type="file" name="file" required>
    <button type="submit">Upload</button>
</form>

<hr>

<h2>📚 Papers</h2>

<ul>
{% for p in papers %}
    <li>
        {{ p.filename }}
        <a href="/papers/view/{{ p.id }}">View</a>
        <a href="/papers/edit/{{ p.id }}">Edit</a>

        <form action="/papers/delete/{{ p.id }}" method="post" style="display:inline;">
            <button type="submit">Delete</button>
        </form>
    </li>
{% endfor %}
</ul>

<hr>
<a href="/chat">💬 Chat</a>

<hr>
<a href="/debug">📊 View Database</a>

</body>
</html>
