<!DOCTYPE html>
<html>
<body>

<h1>💬 Threads</h1>

<form action="/chat/create" method="post">
    <input type="text" name="name" placeholder="Enter thread name" required>
    <input type="text" name="user_id" placeholder="User ID (optional)">
    <button type="submit">Create Thread</button>
</form>

<ul>
{% for t in threads %}
    <li>
        <a href="/chat/{{ t.id }}">
            {{ t.name }} ({{ t.user_id or "anonymous" }})
        </a>
    </li>
{% endfor %}
</ul>

<a href="/">⬅ Back</a>

</body>
</html>
